name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - run: bunx nitro deploy --prebuilt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify live site
        run: |
          echo "--- workers.dev status ---"
          curl -sS -o /dev/null -w "%{http_code}\n" "https://zidanem17-lgtm-carlylemiller-dev.zidanem17.workers.dev/"
          echo "--- workers.dev headers ---"
          curl -sSI "https://zidanem17-lgtm-carlylemiller-dev.zidanem17.workers.dev/"
          echo "--- workers.dev body (first 2KB) ---"
          curl -sS "https://zidanem17-lgtm-carlylemiller-dev.zidanem17.workers.dev/" | head -c 2000
          echo
          echo "--- carlylemiller.dev status ---"
          curl -sS -o /dev/null -w "%{http_code}\n" "https://carlylemiller.dev/"
          echo "--- carlylemiller.dev headers ---"
          curl -sSI "https://carlylemiller.dev/"
          echo "--- carlylemiller.dev body (first 2KB) ---"
          curl -sS "https://carlylemiller.dev/" | head -c 2000
